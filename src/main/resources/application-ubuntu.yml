spring:
  datasource:
    xa:
      properties:
        useInformationSchema: true
    # MySQL 数据源配置
    driver-class-name: com.mysql.cj.jdbc.Driver
    # [修改点] Host 改为容器名 mysql
    url: jdbc:mysql://mysql:3306/dream?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Australia/Melbourne
    # [修改点] 暂时用 root，除非你已经新建了 dream_user
    username: ${DB_USERNAME:epoch}
    password: ${DB_PASSWORD:}   # P2-1: externalized — inject via env (server: dream-app/.env)

  rabbitmq:
    # [保留] 因为你会去网页后台手动创建这个 vhost
    virtual-host: my_vhost
    # [修改点] Host 改为容器名 rabbitmq
    host: rabbitmq
    port: 5672
    # [修改点] 使用 Admin 用户
    username: ${RABBITMQ_USERNAME:epoch}
    password: ${RABBITMQ_PASSWORD:}   # P2-1: externalized — inject via env

  redis:
    # [修改点] Host 改为容器名 redis
    host: redis
    port: 6379
    # [修改点] 必须填写密码
    password: ${REDIS_PASSWORD:}       # P2-1: externalized — inject via env
    database: 0
    jedis:
      pool:
        max-active: 8
        max-wait: 1ms
        max-idle: 4
        min-idle: 0

  elasticsearch:
    # [修改点] Host 改为容器名 elasticsearch
    uris: http://elasticsearch:9200
    connection-timeout: 3s

  # 登录态存 Redis：应用重启/重新部署不掉线；30 天不活跃才过期（滑动续期）
  session:
    store-type: redis
    timeout: 30d
    redis:
      namespace: dream:session

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8088
  servlet:
    session:
      cookie:
        # 持久 cookie：关浏览器不丢登录态（配合上面的 30 天服务端 session）
        max-age: 30d
        http-only: true

cors:
  # P2-2: allowed origins for the future React client (Session + credentials).
  # Add localhost dev origins here too if you run React locally against this server.
  # Domain migration: old + new (www + apex) run in parallel; drop the old one after the 301 settles.
  allowed-origins: https://dream-app.the-epoch.org,https://www.dream-everything.com,https://dream-everything.com

mybatis-plus:
  mapper-locations: classpath*:mybatis/*.xml
  type-aliases-package: com.dream.basketball.entity
  type-aliases-super-type: java.lang.Object

  configuration:
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: VARCHAR

  global-config:
    db-config:
      update-strategy: IGNORED

picPath:
  # [修改点] 必须改为 Linux 路径
  # 确保你已经在 Code-Server 里创建了这个文件夹：mkdir -p /config/workspace/uploads
  uploadPath: /config/workspace/uploads/
  picPath: /picImg/
