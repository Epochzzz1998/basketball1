spring:
  datasource:
    xa:
      properties:
        useInformationSchema: true
    # MySQL 数据源配置
    driver-class-name: com.mysql.cj.jdbc.Driver
    # [修改点] Host 改为容器名 mysql
    url: jdbc:mysql://100.77.48.28:3306/dream?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Australia/Melbourne
    # [修改点] 暂时用 root，除非你已经新建了 dream_user
    username: ${DB_USERNAME:epoch}
    password: ${DB_PASSWORD:}   # P2-1: externalized — inject via env (local: IDE run-config / shell export)

  rabbitmq:
    # [保留] 因为你会去网页后台手动创建这个 vhost
    virtual-host: my_vhost
    # [修改点] Host 改为容器名 rabbitmq
    host: 100.77.48.28
    port: 5672
    # [修改点] 使用 Admin 用户
    username: ${RABBITMQ_USERNAME:epoch}
    password: ${RABBITMQ_PASSWORD:}   # P2-1: externalized — inject via env

  redis:
    # [修改点] Host 改为容器名 redis
    host: 100.77.48.28
    port: 6379
    # [修改点] 必须填写密码
    password: ${REDIS_PASSWORD:}       # P2-1: externalized — inject via env
    database: 0
    jedis:
      pool:
        max-active: 8
        max-wait: 1ms
        max-idle: 4
        min-idle: 0

  elasticsearch:
    # [修改点] Host 改为容器名 elasticsearch
    uris: http://100.77.48.28:9200
    connection-timeout: 3s

  # 登录态存 Redis：应用重启/重新部署不掉线；30 天不活跃才过期（滑动续期）
  session:
    store-type: redis
    timeout: 30d
    redis:
      namespace: dream:session

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8088
  servlet:
    session:
      cookie:
        # 持久 cookie：关浏览器不丢登录态（配合上面的 30 天服务端 session）
        max-age: 30d
        http-only: true

cors:
  # P2-2: allowed origins for the future React client (Session + credentials).
  allowed-origins: http://localhost:5173,http://localhost:3000

mybatis-plus:
  mapper-locations: classpath*:mybatis/*.xml
  type-aliases-package: com.dream.basketball.entity
  type-aliases-super-type: java.lang.Object

  configuration:
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: VARCHAR

  global-config:
    db-config:
      update-strategy: IGNORED

picPath:
  # local = Mac 本地开发：上传写到本机目录（FileUtils 会自动建子目录），
  # /picImg/** 由 ImgConfigurer 映射到同一目录提供访问。服务器用 ubuntu profile 的 Linux 路径。
  uploadPath: /Users/epoch/basketball-uploads/
  picPath: /picImg/
